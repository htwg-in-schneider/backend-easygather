spring.application.name=easygather-backend

# Server (wie saitenweise-backend, Port 8081 für Frontend-Anbindung)
server.port=8081

# Lesbares JSON in der API-Antwort
spring.jackson.serialization.indent-output=true

# Datenbank-Schema bei Start anpassen (Daten bleiben erhalten)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2-Datenbank (lokal, Datei unter target/)
spring.datasource.url=jdbc:h2:file:./target/easygather-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2-Konsole zum Debuggen (optional): http://localhost:8081/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

