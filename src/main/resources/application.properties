spring.application.name=easygather-backend

server.port=8081

spring.jackson.serialization.indent-output=true

spring.jpa.hibernate.ddl-auto=update

# Database configuration
# Default: local H2 database
# For production/MariaDB, set environment variables before starting the backend.
# Important: Never commit the real database password to Git.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./target/easygather-db}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

## Example for MariaDB production start:
## $env:SPRING_DATASOURCE_URL="jdbc:mariadb://58ea917d-11a0-4864-979f-34a7070d9edc.ma.bw-cloud-instance.org:3307/DATENBANKNAME"
## $env:SPRING_DATASOURCE_DRIVER_CLASS_NAME="org.mariadb.jdbc.Driver"
## $env:SPRING_DATASOURCE_USERNAME="BENUTZERNAME"
## $env:SPRING_DATASOURCE_PASSWORD="PASSWORT"
## .\mvnw.cmd spring-boot:run

# Auth0 configuration (OAuth2 resource server)
okta.oauth2.issuer=https://dev-iosekorhszg7vb65.us.auth0.com/
okta.oauth2.audience=https://easygather.api

# increase logging for security debugging
#logging.level.org.springframework.security=DEBUG
#logging.level.com.okta.spring=DEBUG

# Mail configuration (optional for local dev; set SPRING_MAIL_USERNAME and SPRING_MAIL_PASSWORD)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
